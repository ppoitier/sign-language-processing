from: "data.yaml"


experiment:
  id: "test"
  variant: "dgs/ms-tcn"
  seed: random
  debug: false
  show_progress_bar: true


model:
  name: 'hydra'
  backbone:
    name: 'vit'
    kwargs:
      in_channels: 130
      hidden_channels: 256
      max_length: 3500
      n_heads: 4
      n_layers: 6
      dim_feedforward: 1024
      dropout: 0.1
      pos_encoding: "rope"
      attn_mask_strategy: "window:128"
#    name: "ms-tcn"
#    kwargs:
#      in_channels: 130
#      out_channels: 4
#      hidden_channels: 64
#      n_stages: 4
#      n_layers: 10
#  backbone:
#    name: "rnn"
#    kwargs:
#      rnn_type: "gru"
#      in_channels: 130
#      out_channels: 2
#      hidden_channels: 128
#      bidirectional: true
#      num_layers: 4
  heads:
    classification:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2
    regression:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2


training:
  max_epochs: 300
  n_warmup_epochs: 50

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: true
      multi_layer: false
    regression:
      name: "gIoU"
      use_weights: false
      multi_layer: false

  learning_rate: 1e-4
  early_stopping_patience: 10

  n_classes: 2

  is_output_multilayer: true
  overfit_one_batch: false
  use_offsets: true

  heads_to_targets:
    classification: temporal-segmentation
    regression: temporal-offsets

  segment_decoder: { name: 'offsets' }
