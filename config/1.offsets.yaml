from: "data.yaml"


experiment:
  id: "segmentation"
  variant: "dgs/ms-tcn"
  output_dir: "F:/outputs/tmp"
  seed: random
  debug: true
  show_progress_bar: true


model:
  name: 'hydra'
  backbone:
    name: "ms-tcn"
    kwargs:
      in_channels: 130
      out_channels: 4
      hidden_channels: 64
      n_stages: 4
      n_layers: 10
#  backbone:
#    name: "rnn"
#    kwargs:
#      rnn_type: "gru"
#      in_channels: 130
#      out_channels: 2
#      hidden_channels: 128
#      bidirectional: true
#      num_layers: 4
  heads:
    classification:
      name: "identity"
      n_channels: 2
    regression:
      name: "identity"
      n_channels: 2


training:
  max_epochs: 300
  n_warmup_epochs: 50

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: true
      multi_layer: true
    regression:
      name: "gIoU"
      use_weights: false
      multi_layer: true

  learning_rate: 1e-4
  early_stopping_patience: 10

  n_classes: 2

  is_output_multilayer: true
  overfit_one_batch: false
  use_offsets: true

  heads_to_targets:
    classification: temporal-segmentation
    regression: temporal-offsets

  segment_decoder: { name: 'offsets' }
