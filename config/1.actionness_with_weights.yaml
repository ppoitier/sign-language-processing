model:
  name: 'hydra'
  backbone:
    name: "ms-tcn"
    kwargs:
      in_channels: 130
      out_channels: 2
      hidden_channels: 64
      n_stages: 4
      n_layers: 10
  heads:
    classification:
      name: "identity"
      n_channels: 2


training:
  max_epochs: 300
  n_warmup_epochs: 50

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: false
      multi_layer: true
  learning_rate: 1e-4
  early_stopping_patience: 10

  n_classes: 2

  is_output_multilayer: true
  overfit_one_batch: true
  use_offsets: false

  heads_to_targets:
    classification: temporal-segmentation
  segment_decoder: { name: 'actionness' }
