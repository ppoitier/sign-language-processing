experiment:
  id: "actionness_with_weights"
  task: "segmentation"
  variant: "lsfb"
  output_dir: "/gpfs/scratch/acad/lsfb/out/slp"
  seed: 42
  debug: true


datasets:
  example:
    shards_url: "file:E:/datasets/sign-language/lsfb-cont/shards/shard_000000.tar"
    dataloader:
      batch_size: 16
      shuffle: true
      n_workers: 0
    preprocessing:
      targets: ['temporal-segmentation', 'start-offset', 'end-offset']
      pose_transform_pipeline: 'none'
      use_windows: true
      window_size: 3500
      window_stride: 2800
      max_empty_windows: 0

