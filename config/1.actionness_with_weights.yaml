model:
  name: 'hydra'
  backbone:
    name: "ms-tcn"
    kwargs:
      in_channels: 130
      out_channels: 2
      hidden_channels: 64
      n_stages: 4
      n_layers: 10
  heads:
    classification:
      name: "identity"


training:
  max_epochs: 300
  n_warmup_epochs: 50

  criterion:
    classification:
      name: "multi-layer+ce+smoothing"
      use_weights: true
  learning_rate: 1e-4
  early_stopping_patience: 10

  n_classes: 2

  is_output_multilayer: true
  use_offsets: false

  heads_to_targets:
    classification: frame_labels
  segment_decoder: { name: 'actionness' }
