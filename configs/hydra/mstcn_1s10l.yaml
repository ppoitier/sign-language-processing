# MS-TCN with 1 stage — isolates the effect of iterative refinement.

from: "mstcn_4s10l.yaml"


experiment:
  variant: "mstcn_1s10l_h64"
  seed: random


model:
  name: 'hydra'
  backbone:
    name: "ms-tcn"
    kwargs:
      in_channels: 130
      out_channels: 64
      hidden_channels: 64
      n_stages: 1
      n_layers: 10
  heads:
    classification:
      name: "linear"
      n_channels: 64
      kwargs:
        in_features: 64
        out_features: 2
    regression:
      name: "linear"
      n_channels: 64
      kwargs:
        in_features: 64
        out_features: 2
