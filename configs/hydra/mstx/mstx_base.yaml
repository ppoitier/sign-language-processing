# Multi-Stage Transformer baseline — 2 stem + 5 branch layers, 256 hidden.
# Fully-specified; mstx_large.yaml inherits from this one.

from: "data_lsfb.yaml"


experiment:
  variant: "mstx_4h_2s5b_h256_win128_rope"
  seed: random


model:
  name: 'hydra'
  backbone:
    name: 'ms-transformer'
    kwargs:
      in_channels: 130
      hidden_channels: 256
      max_length: 3200
      n_heads: 4
      dim_feedforward: 1024
      n_stem_layers: 2
      n_branch_layers: 5
      dropout: 0.1
      pos_encoding: "rope"
      attn_mask_strategy: "window:128"
  heads:
    classification:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2
    regression:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2


training:
  max_epochs: 300
  n_warmup_epochs: 50

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: false
      multi_layer: false
    regression:
      name: "gIoU"
      use_weights: false
      multi_layer: false

  learning_rate: 1e-4
  early_stopping_patience: 10

  n_classes: 2

  is_output_multistage: true
  overfit_one_batch: false
  use_offsets: true

  heads_to_targets:
    classification: temporal-segmentation
    regression: temporal-offsets

  segment_decoder: { name: 'offsets' }
