# Cross-dataset: ViT baseline retrained on DGS Corpus.
# Inherits the full vit_base.yaml architecture + training spec, then swaps
# the datasets block for DGS and updates experiment.id.

from: "vit_base.yaml"


experiment:
  id: "segmentation/dgs"
  variant: "vit_4h_6l_h256_win128_rope"
  seed: random


# Override datasets with DGS shards. Update paths to match your filesystem.
datasets:
  training:
    shards_url: "file:F:/datasets/sign-language/dgs-corpus/shards/annotated/shard_{000002..000007}.tar"
    dataloader:
      batch_size: 16
      shuffle: true
      n_workers: 23
    preprocessing:
      targets: [ 'temporal-segmentation', 'temporal-offsets', 'segments' ]
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3500
      window_stride: 2800
      max_empty_windows: 0

  validation:
    shards_url: "file:F:/datasets/sign-language/dgs-corpus/shards/annotated/shard_000001.tar"
    dataloader:
      batch_size: 16
      shuffle: false
      n_workers: 23
    preprocessing:
      targets: [ 'temporal-segmentation', 'temporal-offsets', 'segments' ]
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3500
      window_stride: 2800
      max_empty_windows: 0

  testing:
    shards_url: "file:F:/datasets/sign-language/dgs-corpus/shards/annotated/shard_000000.tar"
    dataloader:
      batch_size: 16
      shuffle: false
      n_workers: 23
    preprocessing:
      targets: [ 'temporal-segmentation', 'temporal-offsets', 'segments' ]
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3500
      window_stride: 2800
      max_empty_windows: 0
