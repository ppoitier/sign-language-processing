from: "vit_base.yaml"


experiment:
  variant: "vit_4h_4l_h128_win128_rope"
  seed: random


model:
  name: 'hydra'
  backbone:
    name: 'vit'
    kwargs:
      in_channels: 130
      hidden_channels: 128
      max_length: 3200
      n_heads: 4
      n_layers: 4
      dim_feedforward: 512
      dropout: 0.1
      pos_encoding: "rope"
      attn_mask_strategy: "window:128"
  channels_to_head_routing: "shared"
  heads:
    classification:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2
    regression:
      name: "linear"
      n_channels: 128
      kwargs:
        in_features: 128
        out_features: 2
