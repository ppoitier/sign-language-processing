datasets:
  training:
    shards_url: "file:E:/datasets/sign-language/dgs/shards/shard_{000000..000005}.tar"
    dataloader:
      batch_size: 16
      shuffle: true
      n_workers: 0
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0

  validation:
    shards_url: "file:E:/datasets/sign-language/dgs/shards/shard_000006.tar"
    dataloader:
      batch_size: 32
      shuffle: false
      n_workers: 0
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0

  testing:
    shards_url: "file:E:/datasets/sign-language/dgs/shards/shard_000007.tar"
    dataloader:
      batch_size: 32
      shuffle: false
      n_workers: 0
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0


experiment:
  id: "segmentation/3-mstcn-archs/dgs"
  output_dir: "E:/outputs/debug"
  debug: true
  show_progress_bar: true