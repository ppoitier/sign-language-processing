datasets:
  training:
    shards_url: "/gpfs/scratch/acad/lsfb/datasets/dgs/shards/shard_{000000..000005}.tar"
    dataloader:
      batch_size: 32
      shuffle: true
      n_workers: 2
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0

  validation:
    shards_url: "/gpfs/scratch/acad/lsfb/datasets/dgs/shards/shard_000006.tar"
    dataloader:
      batch_size: 32
      shuffle: false
      n_workers: 2
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0

  testing:
    shards_url: "/gpfs/scratch/acad/lsfb/datasets/dgs/shards/shard_000007.tar"
    dataloader:
      batch_size: 32
      shuffle: false
      n_workers: 2
    preprocessing:
      targets:
        - 'temporal-segmentation'
        - 'temporal-offsets'
        - 'segments'
        - 'bio-tags'
        - 'boundaries-segments'
        - 'boundaries-segmentation'
        - 'boundaries-offsets'
      pose_transforms: [ { name: 'norm+flatten2d' } ]
      use_windows: true
      window_size: 3200
      window_stride: 2560
      max_empty_windows: 0


model:
  name: 'hydra'
  backbone:
    name: "ms-tcn"
    kwargs:
      in_channels: 130
      out_channels: 3
      hidden_channels: 64
      n_stages: 4
      n_layers: 10
  heads:
    classification:
      name: "identity"
      n_channels: 3


training:
  max_epochs: 300

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: false
      multi_layer: true

  learning_rate: 1e-4
  early_stopping_patience: 30

  n_classes: 3

  is_output_multistage: true
  overfit_one_batch: false
  use_offsets: false

  heads_to_targets:
    classification: bio-tags

  segment_decoder: { name: 'bio-argmax' }


experiment:
  id: "segmentation/4-data-quantity-bio/dgs"
  output_dir: "/gpfs/scratch/acad/lsfb/outputs/hydra_v2"
  debug: false
  show_progress_bar: false