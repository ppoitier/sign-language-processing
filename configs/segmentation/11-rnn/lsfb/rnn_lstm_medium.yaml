from: "data.yaml"


experiment:
  variant: "rnn_lstm_medium"
  seed: random


model:
  name: 'hydra'
  backbone:
    name: "rnn"
    kwargs:
      in_channels: 130
      out_channels: 4
      hidden_channels: 128
      num_layers: 2
      bidirectional: True
      rnn_type: "lstm"
  heads:
    classification:
      name: "identity"
      n_channels: 2
    regression:
      name: "identity"
      n_channels: 2


training:
  max_epochs: 300

  loss_functions:
    classification:
      name: "cross-entropy"
      use_weights: false
      multi_layer: true
    regression:
      name: "gIoU"
      use_weights: false
      multi_layer: true

  learning_rate: 1e-4
  early_stopping_patience: 50

  n_classes: 2

  is_output_multistage: true
  overfit_one_batch: false
  use_offsets: true

  heads_to_targets:
    classification: temporal-segmentation
    regression: temporal-offsets

  segment_decoder: { name: 'offsets' }
